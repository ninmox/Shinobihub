<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shinobi Master Session Journal</title>

    <!-- Include html2pdf.js library for premium client-side PDF generation -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>

        :root {

            --bg-dark: #0d0e12;

            --card-dark: #15171e;

            --border-color: #262936;

            --text-main: #ffffff;

            --text-muted: #848e9c;

            --accent-green: #0ecb81;

            --accent-red: #f6465d;

            --accent-blue: #2f80ed;

            --accent-purple: #9b51e0;

        }



        body {

            background-color: var(--bg-dark);

            color: var(--text-main);

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            margin: 0;

            padding: 20px;

        }



        .container {

            max-width: 1200px;

            margin: 0 auto;

        }



        h1 {

            text-align: center;

            color: var(--text-main);

            margin-bottom: 30px;

            font-weight: 600;

            letter-spacing: 1px;

        }



        /* Printable Area Wrapper */

        #report-area {

            padding: 10px;

            background-color: var(--bg-dark);

        }



        .analytics-grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

            gap: 15px;

            margin-bottom: 30px;

        }



        .card {

            background-color: var(--card-dark);

            border: 1px solid var(--border-color);

            border-radius: 8px;

            padding: 20px;

            text-align: center;

        }



        .card-title {

            color: var(--text-muted);

            font-size: 12px;

            text-transform: uppercase;

            margin-bottom: 10px;

            letter-spacing: 0.5px;

        }



        .card-value {

            font-size: 24px;

            font-weight: bold;

        }



        .control-panel {

            display: flex;

            justify-content: space-between;

            align-items: center;

            flex-wrap: wrap;

            gap: 15px;

            margin-bottom: 20px;

        }



        .btn-group {

            display: flex;

            gap: 10px;

        }



        .btn {

            color: white;

            border: none;

            padding: 12px 20px;

            border-radius: 6px;

            cursor: pointer;

            font-weight: 600;

            font-size: 14px;

            transition: opacity 0.2s;

        }



        .btn:hover {

            opacity: 0.9;

        }



        .btn-add { background-color: var(--accent-blue); }

        .btn-csv { background-color: var(--accent-green); }

        .btn-pdf { background-color: var(--accent-purple); }



        .table-container {

            overflow-x: auto;

            background-color: var(--card-dark);

            border: 1px solid var(--border-color);

            border-radius: 8px;

        }



        table {

            width: 100%;

            border-collapse: collapse;

            text-align: left;

        }



        th, td {

            padding: 14px 16px;

            border-bottom: 1px solid var(--border-color);

            font-size: 14px;

        }



        th {

            background-color: #1c1f2a;

            color: var(--text-muted);

            font-weight: 500;

        }



        input, select {

            background-color: var(--bg-dark);

            color: var(--text-main);

            border: 1px solid var(--border-color);

            padding: 8px 12px;

            border-radius: 4px;

            width: 100%;

            box-sizing: border-box;

        }



        input:focus, select:focus {

            border-color: var(--accent-blue);

            outline: none;

        }



        .btn-delete {

            background-color: transparent;

            color: var(--accent-red);

            border: 1px solid var(--accent-red);

            padding: 6px 10px;

            border-radius: 4px;

            cursor: pointer;

        }



        .btn-delete:hover {

            background-color: rgba(246, 70, 93, 0.1);

        }



        .text-win { color: var(--accent-green) !important; font-weight: bold; }

        .text-loss { color: var(--accent-red) !important; font-weight: bold; }



        /* PDF Generation Overrides */

        .pdf-mode input, .pdf-mode select {

            border: none !important;

            background: transparent !important;

            color: var(--text-main) !important;

            padding: 0 !important;

            appearance: none;

            -webkit-appearance: none;

        }

        .pdf-mode .btn-delete, .pdf-mode .control-panel {

            display: none !important;

        }

    </style>

</head>

<body>



<div class="container">

    <h1>SHINOBI MASTER SESSION JOURNAL</h1>



    <div class="control-panel">

        <button class="btn btn-add" onclick="addNewRow()">+ Add New Trade</button>

        <div class="btn-group">

            <button class="btn btn-csv" onclick="exportToCSV()">Download CSV</button>

            <button class="btn btn-pdf" onclick="exportToPDF()">Download PDF Report</button>

        </div>

    </div>



    <!-- Wrap everything that goes into the document report -->

    <div id="report-area">

        <!-- Analytics Dashboard -->

        <div class="analytics-grid">

            <div class="card">

                <div class="card-title">Total Trades Executed</div>

                <div id="metric-total-trades" class="card-value">0</div>

            </div>

            <div class="card">

                <div class="card-title">Total Win Rate (%)</div>

                <div id="metric-win-rate" class="card-value">0%</div>

            </div>

            <div class="card">

                <div class="card-title">Net Accumulated PnL</div>

                <div id="metric-net-pnl" class="card-value">0</div>

            </div>

            <div class="card">

                <div class="card-title">Average Profit Factor</div>

                <div id="metric-profit-factor" class="card-value">0.00</div>

            </div>

        </div>



        <!-- Journal Table -->

        <div class="table-container">

            <table id="journal-table">

                <thead>

                    <tr>

                        <th style="width: 10%;">Trade ID</th>

                        <th style="width: 20%;">Asset / Pair</th>

                        <th style="width: 15%;">Direction</th>

                        <th style="width: 15%;">Outcome</th>

                        <th style="width: 25%;">Net PnL ($)</th>

                        <th class="action-header" style="width: 15%;">Actions</th>

                    </tr>

                </thead>

                <tbody id="journal-tbody">

                    <!-- Rows injected dynamically -->

                </tbody>

            </table>

        </div>

    </div>

</div>



<script>

    let tradeDatabase = JSON.parse(localStorage.getItem('shinobi_journal_data')) || [];



    document.addEventListener('DOMContentLoaded', () => {

        renderTable();

        calculateMetrics();

    });



    function saveToLocalStorage() {

        localStorage.setItem('shinobi_journal_data', JSON.stringify(tradeDatabase));

    }



    function renderTable() {

        const tbody = document.getElementById('journal-tbody');

        tbody.innerHTML = '';



        if (tradeDatabase.length === 0) {

            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">No trades logged in this session. Add a trade above to get started.</td></tr>`;

            return;

        }



        tradeDatabase.forEach((trade, index) => {

            const row = document.createElement('tr');

            

            row.innerHTML = `

                <td><strong>T-${String(index + 1).padStart(2, '0')}</strong></td>

                <td>

                    <input type="text" value="${trade.asset}" onchange="updateCell(${index}, 'asset', this.value)" placeholder="e.g., BTCUSDT">

                </td>

                <td>

                    <select onchange="updateCell(${index}, 'direction', this.value)">

                        <option value="LONG" ${trade.direction === 'LONG' ? 'selected' : ''}>LONG 🟢</option>

                        <option value="SHORT" ${trade.direction === 'SHORT' ? 'selected' : ''}>SHORT 🔴</option>

                    </select>

                </td>

                <td>

                    <select onchange="updateCell(${index}, 'outcome', this.value)">

                        <option value="WIN" ${trade.outcome === 'WIN' ? 'selected' : ''}>🏆 WIN</option>

                        <option value="LOSS" ${trade.outcome === 'LOSS' ? 'selected' : ''}>💀 LOSS</option>

                    </select>

                </td>

                <td>

                    <input type="number" value="${trade.pnl}" onchange="updateCell(${index}, 'pnl', this.value)" placeholder="0.00">

                </td>

                <td class="action-cell">

                    <button class="btn-delete" onclick="deleteRow(${index})">Delete</button>

                </td>

            `;

            tbody.appendChild(row);

        });

    }



    function addNewRow() {

        tradeDatabase.push({ asset: '', direction: 'LONG', outcome: 'WIN', pnl: 0 });

        saveToLocalStorage();

        renderTable();

        calculateMetrics();

    }



    function updateCell(index, key, value) {

        if (key === 'pnl') {

            tradeDatabase[index][key] = parseFloat(value) || 0;

        } else {

            tradeDatabase[index][key] = value;

        }

        saveToLocalStorage();

        calculateMetrics();

    }



    function deleteRow(index) {

        tradeDatabase.splice(index, 1);

        saveToLocalStorage();

        renderTable();

        calculateMetrics();

    }



    function calculateMetrics() {

        const totalTrades = tradeDatabase.length;

        let totalWins = 0, netPnL = 0, grossProfits = 0, grossLosses = 0;



        tradeDatabase.forEach(trade => {

            netPnL += trade.pnl;

            if (trade.outcome === 'WIN') {

                totalWins++;

                if (trade.pnl > 0) grossProfits += trade.pnl;

            } else if (trade.outcome === 'LOSS') {

                grossLosses += trade.pnl < 0 ? Math.abs(trade.pnl) : trade.pnl;

            }

        });



        const winRate = totalTrades > 0 ? Math.round((totalWins / totalTrades) * 100) : 0;

        const profitFactor = grossLosses > 0 ? (grossProfits / grossLosses).toFixed(2) : (grossProfits > 0 ? grossProfits.toFixed(2) : "0.00");



        document.getElementById('metric-total-trades').innerText = totalTrades;

        document.getElementById('metric-win-rate').innerText = `${winRate}%`;

        document.getElementById('metric-net-pnl').innerText = netPnL;

        document.getElementById('metric-profit-factor').innerText = profitFactor;

        

        const pnlElement = document.getElementById('metric-net-pnl');

        pnlElement.className = 'card-value ' + (netPnL > 0 ? 'text-win' : (netPnL < 0 ? 'text-loss' : ''));

    }



    // Engine: Export Ledger to clean CSV File

    function exportToCSV() {

        if (tradeDatabase.length === 0) return alert("No data to export!");

        

        let csvContent = "data:text/csv;charset=utf-8,Trade ID,Asset/Pair,Direction,Outcome,Net PnL ($)\n";

        tradeDatabase.forEach((t, i) => {

            csvContent += `T-${String(i+1).padStart(2,'0')},${t.asset},${t.direction},${t.outcome},${t.pnl}\n`;

        });

        

        const encodedUri = encodeURI(csvContent);

        const link = document.createElement("a");

        link.setAttribute("href", encodedUri);

        link.setAttribute("download", `shinobi_trading_session_${new Date().toISOString().slice(0,10)}.csv`);

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);

    }



    // Engine: Print Premium PDF Document from UI View

    function exportToPDF() {

        if (tradeDatabase.length === 0) return alert("No data to export!");

        

        const element = document.getElementById('report-area');

        

        // Temporarily transform inputs to clean text strings for seamless printing

        const rows = element.querySelectorAll('tbody tr');

        rows.forEach((row, index) => {

            const data = tradeDatabase[index];

            if(data) {

                row.cells[1].innerHTML = `<span>${data.asset || 'N/A'}</span>`;

                row.cells[2].innerHTML = `<span>${data.direction}</span>`;

                row.cells[3].innerHTML = `<span class="${data.outcome === 'WIN' ? 'text-win' : 'text-loss'}">${data.outcome}</span>`;

                row.cells[4].innerHTML = `<span class="${data.pnl >= 0 ? 'text-win' : 'text-loss'}">${data.pnl}</span>`;

                row.cells[5].style.display = 'none'; // Hide actions column entirely

            }

        });

        element.querySelector('.action-header').style.display = 'none';



        const opt = {

            margin:       15,

            filename:     `shinobi_performance_report_${new Date().toISOString().slice(0,10)}.pdf`,

            image:        { type: 'jpeg', quality: 0.98 },

            html2canvas:  { scale: 2, backgroundColor: '#0d0e12', useCORS: true },

            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }

        };



        html2pdf().set(opt).from(element).save().then(() => {

            // Restore UI inputs back to interactive state post-rendering

            renderTable();

            calculateMetrics();

        });

    }

</script>



</body>

</html>
